  @keyframes twinkle {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }
  .shooting-star {
    position: fixed;
    top: 0;
    left: 0;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px 2px rgba(255,255,255,0.95), 0 0 16px 4px rgba(180,200,255,0.5);
    z-index: -1;
    pointer-events: none;
    opacity: 0;
  }
  .shooting-star.s1 { animation: shoot1 40s linear infinite; animation-delay: 5s; }
  .shooting-star.s2 { animation: shoot2 55s linear infinite; animation-delay: 22s; }
  .shooting-star.s3 { animation: shoot3 70s linear infinite; animation-delay: 45s; }
  @keyframes shoot1 {
    0% { transform: translate(10vw, -5vh); opacity: 0; }
    1% { opacity: 1; }
    8% { transform: translate(80vw, 60vh); opacity: 1; }
    9% { opacity: 0; }
    100% { transform: translate(80vw, 60vh); opacity: 0; }
  }
  @keyframes shoot2 {
    0% { transform: translate(85vw, -5vh); opacity: 0; }
    1% { opacity: 1; }
    7% { transform: translate(15vw, 55vh); opacity: 1; }
    8% { opacity: 0; }
    100% { transform: translate(15vw, 55vh); opacity: 0; }
  }
  @keyframes shoot3 {
    0% { transform: translate(-5vw, 20vh); opacity: 0; }
    1% { opacity: 1; }
    9% { transform: translate(70vw, 85vh); opacity: 1; }
    10% { opacity: 0; }
    100% { transform: translate(70vw, 85vh); opacity: 0; }
  }
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  h1 {
    font-size: clamp(2.25rem, 5vw, 3.5rem);
    font-weight: 800;
    background: linear-gradient(90deg, #f5a623, #f47a7a, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.02em;
  }
  .tagline {
    margin-top: 12px;
    color: #b8b3e0;
    font-size: 1.125rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
    width: 100%;
    max-width: 880px;
  }
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    position: relative;
    display: block;
    border-radius: 20px;
    overflow: hidden;
    background: #251d6b;
    text-decoration: none;
    color: inherit;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    aspect-ratio: 16 / 9;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px rgba(167, 139, 250, 0.35);
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card::after {
    content: "Play →";
    position: absolute;
    bottom: 16px;
    right: 20px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.9rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .card:hover::after {
    opacity: 1;
    transform: translateY(0);
  }
  footer {
    margin-top: auto;
    padding-top: 48px;
    color: #6c679a;
    font-size: 0.875rem;
