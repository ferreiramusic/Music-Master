<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Ninja - Music Note Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #FF6B9D;
    --purple: #C084FC;
    --blue: #60A5FA;
    --cyan: #22D3EE;
    --green: #4ADE80;
    --yellow: #FACC15;
    --orange: #FB923C;
    --red: #F87171;
    --dark: #1E1B4B;
    --darker: #0F0D2E;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1E1B4B 0%, #312E81 30%, #4C1D95 60%, #1E1B4B 100%);
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
  }

  /* Animated background stars */
  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 4px; height: 4px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8em;
    text-align: center;
    margin-bottom: 2px;
    text-shadow: none;
  }
  .title-text {
    background: linear-gradient(90deg, var(--yellow), var(--orange), var(--pink), var(--purple), var(--cyan));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
  }
  .ninja-char {
    width: 140px;
    height: 120px;
    flex-shrink: 0;
    margin-bottom: -40px;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% center; }
    50% { background-position: 200% center; }
  }

  .title-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }

  .subtitle {
    text-align: center;
    font-size: 1.1em;
    font-weight: 700;
    background: linear-gradient(90deg, var(--yellow), var(--orange), var(--pink), var(--purple), var(--cyan));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
    margin: 0;
  }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Cards */
  .card {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3em;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Form elements */
  .input-group { margin-bottom: 18px; }
  .input-group label {
    display: block;
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 1.05em;
  }

  .name-input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 1.1em;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    outline: none;
    transition: border-color 0.3s;
  }
  .name-input::placeholder { color: rgba(255,255,255,0.4); }
  .name-input:focus { border-color: var(--cyan); }
  .name-input.error { border-color: var(--red); }
  .name-error {
    color: var(--red);
    font-size: 0.85em;
    font-weight: 700;
    margin-top: 8px;
    display: none;
  }

  /* Option buttons */
  .option-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
  }
  .option-btn {
    padding: 12px 16px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .option-btn:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .option-btn.selected {
    border-color: var(--cyan);
    background: rgba(34, 211, 238, 0.2);
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
  }
  .option-grid-small {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option-grid-small--row {
    flex-direction: row;
    flex-wrap: wrap;
  }
  .option-grid-small--row .option-btn-small {
    width: auto;
    flex: 1 1 auto;
  }
  .option-btn-small {
    padding: 7px 10px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    width: 100%;
  }
  .option-btn-small:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-1px);
  }
  .option-btn-small.selected {
    border-color: var(--cyan);
    background: rgba(34, 211, 238, 0.2);
    box-shadow: 0 0 14px rgba(34, 211, 238, 0.15);
  }

  /* Start button */
  .start-btn {
    display: block;
    width: 100%;
    padding: 18px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.5em;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 6px 25px rgba(192, 132, 252, 0.3);
    letter-spacing: 1px;
    margin: 20px 0;
    animation: btnFlash 2s ease-in-out infinite;
  }
  @keyframes btnFlash {
    0%, 100% { box-shadow: 0 6px 25px rgba(192, 132, 252, 0.3); }
    50% { box-shadow: 0 6px 40px rgba(192, 132, 252, 0.8), 0 0 60px rgba(236, 72, 153, 0.4); }
  }
  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 35px rgba(192, 132, 252, 0.5);
    animation: none;
  }
  .start-btn:active { transform: translateY(0); animation: none; }

  /* Game screen */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .stat-box {
    background: rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 10px 18px;
    text-align: center;
    min-width: 90px;
  }
  .stat-label {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    font-weight: 800;
  }
  .stat-value {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6em;
  }
  .stat-value.score-val { color: var(--yellow); }
  .stat-value.timer-val { color: var(--cyan); }
  .stat-value.streak-val { color: var(--green); }

  /* Timer bar */
  .timer-bar-container {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    border-radius: 10px;
    transition: width 0.1s linear, background 0.5s;
    background: linear-gradient(90deg, var(--cyan), var(--blue));
  }
  .timer-bar.warning { background: linear-gradient(90deg, var(--orange), var(--yellow)); }
  .timer-bar.danger { background: linear-gradient(90deg, var(--red), var(--orange)); }

  /* Staff display */
  .staff-container {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 30px 20px;
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 220px;
    position: relative;
    overflow: hidden;
  }

  /* Staff-container flash overlay */
  .screen-flash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 20px;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
  }
  .screen-flash.correct-flash {
    background: rgba(74, 222, 128, 0.5);
    animation: screenFlash 1.2s ease-out forwards;
  }
  .screen-flash.wrong-flash {
    background: rgba(248, 113, 113, 0.5);
    animation: screenFlash 1.2s ease-out forwards;
  }
  @keyframes screenFlash {
    0% { opacity: 1; }
    40% { opacity: 0.7; }
    100% { opacity: 0; }
  }

  /* Confetti / celebration */
  .confetti-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 150;
    pointer-events: none;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 12px;
    height: 12px;
    top: -20px;
    animation: confettiFall var(--fall-dur) ease-in forwards;
    opacity: 0.9;
  }
  .confetti-piece.star {
    font-size: 24px;
    width: auto; height: auto;
    background: none !important;
    line-height: 1;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80% { opacity: 0.8; }
    100% { transform: translateY(105vh) rotate(var(--rot)) scale(0.5); opacity: 0; }
  }

  /* Streak celebration text */
  .streak-celebration {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 160;
    font-family: 'Fredoka One', cursive;
    font-size: 3em;
    color: var(--yellow);
    text-shadow: 0 0 30px rgba(250, 204, 21, 0.6), 0 4px 15px rgba(0,0,0,0.3);
    pointer-events: none;
    white-space: nowrap;
  }
  .streak-celebration.show {
    animation: streakPop 1.8s ease-out forwards;
  }
  @keyframes streakPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    15% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    30% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
  }

  /* Results Modal */
  .results-backdrop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    background: rgba(15, 13, 46, 0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }
  .results-backdrop.show {
    opacity: 1;
    pointer-events: auto;
  }
  .results-modal {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 36px 32px 28px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.35s;
    opacity: 0;
  }
  .results-backdrop.show .results-modal {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  .results-emoji {
    font-size: 3em;
    margin-bottom: 6px;
  }
  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2em;
    color: var(--yellow);
    margin-bottom: 6px;
  }
  .results-encouragement {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25em;
    margin-bottom: 20px;
  }
  .results-stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .results-stat {
    background: rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 14px 20px;
    min-width: 90px;
  }
  .results-stat-label {
    font-size: 0.72em;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    font-weight: 800;
    margin-bottom: 4px;
  }
  .results-stat-value {
    font-family: 'Fredoka One', cursive;
    font-size: 2em;
    line-height: 1;
  }
  .results-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .results-btn {
    flex: 1;
    padding: 12px 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1em;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .results-btn:hover { transform: translateY(-2px); opacity: 0.9; }
  .results-btn-play {
    background: var(--purple);
    color: white;
  }
  .results-btn-menu {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
  }

  /* Score display on menu */
  .menu-scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .menu-score-box {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
  }
  .menu-score-label {
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    font-weight: 800;
    margin-bottom: 4px;
  }
  .menu-score-value {
    font-family: 'Fredoka One', cursive;
    font-size: 2em;
  }
  .menu-score-sub {
    font-size: 0.85em;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }


  /* Game control buttons */
  .game-controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 5px;
  }
  .game-ctrl-btn {
    padding: 8px 24px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .game-ctrl-btn:hover {
    background: rgba(255,255,255,0.15);
    color: white;
    transform: translateY(-1px);
  }

  /* Answer buttons */
  .answer-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 15px;
  }
  .answer-btn {
    padding: 16px 8px;
    border-radius: 16px;
    border: 3px solid transparent;
    font-family: 'Fredoka One', cursive;
    font-size: 1.5em;
    cursor: pointer;
    transition: all 0.15s;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .answer-btn:nth-child(1) { background: var(--red); }
  .answer-btn:nth-child(2) { background: var(--orange); }
  .answer-btn:nth-child(3) { background: var(--yellow); color: #92400E; }
  .answer-btn:nth-child(4) { background: var(--green); }
  .answer-btn:nth-child(5) { background: var(--cyan); }
  .answer-btn:nth-child(6) { background: var(--blue); }
  .answer-btn:nth-child(7) { background: var(--purple); }

  .answer-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }
  .answer-btn:active { transform: translateY(0); }
  .answer-btn.correct-pop {
    animation: popCorrect 0.4s ease-out;
    border-color: white;
  }
  .answer-btn.wrong-shake {
    animation: shakeWrong 0.4s ease-out;
    opacity: 0.5;
  }
  @keyframes popCorrect {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes shakeWrong {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Clef label badge */
  .clef-badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .clef-badge.treble { background: rgba(96,165,250,0.2); color: var(--blue); }
  .clef-badge.bass { background: rgba(251,146,60,0.2); color: var(--orange); }


  .correct-note-display {
    text-align: center;
    font-size: 1em;
    color: rgba(255,255,255,0.5);
    margin-top: -10px;
    margin-bottom: 10px;
    font-weight: 700;
    min-height: 1.4em;
  }

  /* Slide toggle */
  .slide-toggle {
    position: relative;
    width: 100%;
  }
  .slide-toggle input { display: none; }
  .slide-toggle-track {
    display: flex;
    position: relative;
    background: rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 4px;
    cursor: pointer;
  }
  .slide-toggle-option {
    flex: 1;
    text-align: center;
    padding: 14px 10px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1em;
    color: rgba(255,255,255,0.5);
    position: relative;
    z-index: 2;
    transition: color 0.3s;
    user-select: none;
  }
  .slide-toggle-option.active {
    color: white;
  }
  .slide-toggle-thumb {
    position: absolute;
    top: 4px;
    left: 4px;
    width: calc(50% - 4px);
    height: calc(100% - 8px);
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border-radius: 12px;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), background 0.35s;
    z-index: 1;
    box-shadow: 0 4px 15px rgba(192, 132, 252, 0.3);
  }
  .slide-toggle input:checked ~ .slide-toggle-track .slide-toggle-thumb {
    transform: translateX(100%);
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3);
  }

  /* Piano keyboard */
  #piano-game-screen {
    background: linear-gradient(135deg, rgba(6,78,59,0.3), rgba(4,120,87,0.2));
    border-radius: 24px;
    padding: 20px;
    border: 2px solid rgba(52,211,153,0.15);
  }
  .piano-container {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    min-height: 220px;
  }
  .piano-keyboard {
    display: flex;
    position: relative;
    height: 160px;
    margin: 0 auto;
    max-width: 100%;
    justify-content: center;
  }
  .piano-key {
    position: relative;
    border: 1px solid #999;
    border-radius: 0 0 6px 6px;
    cursor: default;
    transition: background 0.15s;
  }
  .piano-key.white {
    width: 36px;
    height: 150px;
    background: #fff;
    z-index: 1;
    margin: 0 1px;
  }
  .piano-key.black {
    width: 24px;
    height: 95px;
    background: #222;
    z-index: 2;
    margin: 0 -12px;
    border-color: #000;
    border-radius: 0 0 4px 4px;
  }
  .piano-key.highlighted {
    background: var(--cyan) !important;
    box-shadow: 0 0 15px rgba(34,211,238,0.6);
  }
  .piano-key.black.highlighted {
    background: var(--blue) !important;
    box-shadow: 0 0 15px rgba(96,165,250,0.6);
  }
  .piano-key .key-label {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7em;
    font-weight: 700;
    color: #999;
    pointer-events: none;
  }
  .piano-key.black .key-label {
    color: #aaa;
    bottom: 5px;
    font-size: 0.6em;
  }
  .piano-key.highlighted .key-label {
    color: white;
    font-weight: 800;
  }

  /* Natural notes aligned to 14-col grid for Level 2 */
  .answer-grid-aligned {
    grid-template-columns: repeat(14, 1fr) !important;
  }
  .answer-grid-aligned .answer-btn {
    grid-column: span 2;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 4px;
  }

  /* Sharps/flats answer grid - positioned between natural notes */
  .piano-keys-grid {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    gap: 8px;
    margin-top: -4px;
    margin-bottom: 15px;
  }
  .sharp-btn {
    font-size: 1.1em !important;
    border-color: rgba(255,255,255,0.3) !important;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 4px !important;
  }
  .sharp-btn:nth-child(1) { background: #8b1a1a !important; color: white !important; }
  .sharp-btn:nth-child(2) { background: #8b5e1a !important; color: white !important; }
  .sharp-btn:nth-child(3) { background: #1a6b3c !important; color: white !important; }
  .sharp-btn:nth-child(4) { background: #1a4a8b !important; color: white !important; }
  .sharp-btn:nth-child(5) { background: #5a1a8b !important; color: white !important; }

  /* Clickable piano keys for Level 3 */
  .piano-key.clickable {
    cursor: pointer;
  }
  .piano-key.clickable:hover {
    background: #e8e8e8;
  }
  .piano-key.black.clickable:hover {
    background: #444;
  }
  .piano-key.correct-key {
    background: var(--green) !important;
    transition: background 0.15s;
  }
  .piano-key.wrong-key {
    background: var(--red) !important;
    transition: background 0.15s;
  }

  /* Responsive - Tablet */
  @media (max-width: 700px) {
    .container { padding: 15px; }
    h1 { font-size: 2.4em; }
    .stat-box { min-width: 75px; padding: 8px 12px; }
    .stat-value { font-size: 1.3em; }
    .staff-container { padding: 20px 10px; min-height: 180px; }
    .staff-container svg { width: 100%; height: auto; }
    .piano-container { padding: 15px; min-height: 180px; }
    .piano-keyboard { height: 140px; }
    .piano-key.white { width: 30px; height: 130px; }
    .piano-key.black { width: 20px; height: 82px; margin: 0 -10px; }
    .answer-btn { font-size: 1.2em; padding: 14px 6px; }
    .sharp-btn { font-size: 0.95em !important; }
  }

  /* Responsive - Mobile */
  @media (max-width: 500px) {
    .container { padding: 10px; }
    h1 { font-size: 1.8em; }
    .subtitle { font-size: 0.9em; }
    .card { padding: 18px 14px; margin-bottom: 14px; }
    .card-title { font-size: 1.1em; }
    .option-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .option-btn { font-size: 0.85em; padding: 10px 8px; }
    .slide-toggle-option { padding: 10px 6px; font-size: 0.95em; }
    .start-btn { font-size: 1.2em; padding: 14px; margin: 14px 0; }
    .game-header { justify-content: center; }
    .stat-box { min-width: 65px; padding: 6px 10px; }
    .stat-label { font-size: 0.65em; }
    .stat-value { font-size: 1.1em; }
    .timer-bar-container { height: 8px; margin-bottom: 12px; }
    .staff-container { padding: 15px 8px; min-height: 150px; border-radius: 14px; }
    .staff-container svg { width: 100%; height: auto; }
    .piano-container { padding: 10px; min-height: 150px; border-radius: 14px; }
    .piano-keyboard { height: 110px; }
    .piano-key.white { width: 22px; height: 100px; }
    .piano-key.black { width: 16px; height: 65px; margin: 0 -8px; }
    .answer-btn { font-size: 1em; padding: 10px 4px; border-radius: 12px; }
    .answer-grid { gap: 6px; margin-bottom: 10px; }
    .answer-grid-aligned .answer-btn { font-size: 0.9em; }
    .piano-keys-grid { gap: 6px; margin-bottom: 10px; }
    .sharp-btn { font-size: 0.75em !important; padding: 6px 2px !important; }
    .results-stats { grid-template-columns: repeat(3, 1fr); }
    .game-controls { gap: 8px; }
    .game-ctrl-btn { font-size: 0.9em; padding: 10px 16px; }
    #piano-game-screen { padding: 14px; border-radius: 18px; }
    .menu-scores { gap: 8px; }
    .menu-score-box { padding: 14px; }
    .menu-score-value { font-size: 2em; }
  }

  /* Responsive - Small mobile */
  @media (max-width: 380px) {
    h1 { font-size: 1.5em; }
    .container { padding: 8px; }
    .card { padding: 14px 10px; }
    .piano-keyboard { height: 90px; }
    .piano-key.white { width: 18px; height: 85px; }
    .piano-key.black { width: 13px; height: 55px; margin: 0 -6.5px; }
    .answer-btn { font-size: 0.85em; padding: 8px 2px; }
    .sharp-btn { font-size: 0.65em !important; }
    .option-grid { grid-template-columns: 1fr 1fr; }
    .stat-box { min-width: 55px; padding: 5px 6px; }
  }
</style>
</head>

  <div class="screen active" id="menu-screen">
    <!-- Game Mode Toggle -->
    <div class="card">
      <div class="card-title">Game Mode</div>
      <div class="slide-toggle" id="slide-toggle">
        <input type="checkbox" id="game-mode-toggle">
        <div class="slide-toggle-track">
          <span class="slide-toggle-option" id="toggle-label-staff">Staff Notes</span>
          <span class="slide-toggle-option" id="toggle-label-piano">Piano Keys</span>

        </div>
      </div>
    </div>

    <div id="staff-mode-options">
    <div class="card">
      <div style="margin-bottom:12px;">
        <div class="card-title" style="margin-bottom:8px;">Choose Clef</div>
        <div class="option-grid-small option-grid-small--row" id="clef-options">
          <button class="option-btn-small selected" data-value="treble">Treble</button>
          <button class="option-btn-small" data-value="bass">Bass</button>
          <button class="option-btn-small" data-value="both">Both</button>
        </div>
      </div>
      <div>
        <div class="card-title" style="margin-bottom:8px;">Difficulty</div>
        <div class="option-grid-small option-grid-small--row" id="difficulty-options">

          <button class="option-btn-small" data-value="spaces">Spaces</button>

          <button class="option-btn-small" data-value="ledger">Ledger Lines</button>
        </div>
      </div>
    </div>
    </div><!-- end staff-mode-options -->

        <button class="option-btn" data-value="level3">Staff to Keys</button>

    </div>

    <!-- Natural notes (Level 1) -->

// ==================== SOUND EFFECTS ====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  // Ensure audio context is running (needed after user gesture)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;

  if (type === 'correct') {
    // Happy rising two-tone chime
    [523.25, 659.25].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, now + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.3);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.1);
      osc.stop(now + i * 0.1 + 0.3);
    });
  } else if (type === 'wrong') {
    // Low buzz tone
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 180;
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  } else if (type === 'streak') {
    // Ascending fanfare arpeggio
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, now + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.12);
      osc.stop(now + i * 0.12 + 0.4);
    });
  } else if (type === 'gameover') {
    // Descending three-note
    [440, 349.23, 261.63].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, now + i * 0.25);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.25 + 0.5);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.25);
      osc.stop(now + i * 0.25 + 0.5);
    });
  } else if (type === 'startup') {
    // Quick ascending power-up sweep
    [392, 523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.18, now + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.25);
    });
  }
}

// ==================== CONFETTI ====================

// ==================== DRAWING ====================
function drawStaff(svg, clef, note) {
  const staffTop = 60;
  const lineSpacing = 20;
  let svgContent = '';

  // Staff lines
  for (let i = 0; i < 5; i++) {
    const y = staffTop + i * lineSpacing;
    svgContent += `<line x1="80" y1="${y}" x2="360" y2="${y}" stroke="#333" stroke-width="1.5"/>`;
  }

  // Draw clef
  if (clef === 'treble') {
    svgContent += drawTrebleClef(90, staffTop, lineSpacing);
  } else {
    svgContent += drawBassClef(90, staffTop, lineSpacing);
  }

  // Draw note
  if (note) {
    const noteX = 230;
    const noteY = note.y;

    // Ledger lines from note data
    if (note.ledgerY) {
      note.ledgerY.forEach(ly => {
        svgContent += `<line x1="${noteX - 20}" y1="${ly}" x2="${noteX + 20}" y2="${ly}" stroke="#333" stroke-width="1.5"/>`;
      });
    }

    // Note head only (whole note style - filled oval)
    svgContent += `<ellipse cx="${noteX}" cy="${noteY}" rx="11" ry="8" fill="#1a1a2e" transform="rotate(-15, ${noteX}, ${noteY})"/>`;
  }

  svg.innerHTML = svgContent;
}

function drawTrebleClef(x, staffTop, sp) {
  // Use the Unicode treble clef character rendered as SVG text
  const cx = x + 6;
  const cy = staffTop + sp * 3.2;
  return `<text x="${cx}" y="${cy}" font-size="78" font-family="Bravura, Noto Music, Segoe UI Symbol, serif" fill="#1a1a2e">&#119070;</text>`;
}

// Generate bass clef bitmap at startup
const bassClefDataUrl = (() => {
  const canvas = document.createElement('canvas');
  canvas.width = 200;
  canvas.height = 240;
  const ctx = canvas.getContext('2d');
  ctx.font = '200px serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.textBaseline = 'top';
  ctx.fillText('\uD834\uDD22', 10, 10);
  // Find bounding box and crop
  const imageData = ctx.getImageData(0, 0, 200, 240);
  let minX = 200, minY = 240, maxX = 0, maxY = 0;
  for (let y = 0; y < 240; y++) {
    for (let x = 0; x < 200; x++) {
      if (imageData.data[(y * 200 + x) * 4 + 3] > 10) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  const w = maxX - minX + 1, h = maxY - minY + 1;
  const cropCanvas = document.createElement('canvas');
  cropCanvas.width = w;
  cropCanvas.height = h;
  cropCanvas.getContext('2d').drawImage(canvas, minX, minY, w, h, 0, 0, w, h);
  return { url: cropCanvas.toDataURL('image/png'), w, h, dotRow: 26 };
})();

function drawBassClef(x, staffTop, sp) {
  // Bitmap bass clef from system font, scaled so top of curl = top staff line
  // and F-line dot (at dotRow in the bitmap) aligns with staffTop + sp
  const fy = staffTop + sp; // F line y position
  const staffHeight = sp * 4; // total height of the 5-line staff
  const scale = staffHeight / bassClefDataUrl.h; // fit entire clef within staff
  const imgW = bassClefDataUrl.w * scale;
  const imgH = staffHeight;
  const imgX = x - 5;
  const imgY = staffTop; // top of clef at top staff line
  return `<image href="${bassClefDataUrl.url}" x="${imgX}" y="${imgY}" width="${imgW}" height="${imgH}"/>`;
}

// ==================== GAME LOGIC ====================
function getAvailableNotes() {
  const clefs = state.clef === 'both' ? ['treble', 'bass'] : [state.clef];
  const notes = [];

  clefs.forEach(c => {
    const noteSet = c === 'treble' ? TREBLE_NOTES : BASS_NOTES;
    const diff = state.difficulty;

    if (diff === 'lines' || diff === 'lines-spaces' || diff === 'ledger') {
      noteSet.lines.forEach(n => notes.push({ ...n, clef: c }));
    }
    if (diff === 'spaces' || diff === 'lines-spaces' || diff === 'ledger') {
      noteSet.spaces.forEach(n => notes.push({ ...n, clef: c }));
    }
    if (diff === 'ledger') {
      noteSet.ledger.forEach(n => notes.push({ ...n, clef: c }));
    }
  });

  return notes;
}

function pickRandomNote() {
  const available = getAvailableNotes();
  let note;
  // Avoid same note twice in a row
  do {
    note = available[Math.floor(Math.random() * available.length)];
  } while (state.currentNote && note.label === state.currentNote.label && available.length > 1);
  return note;
}

function showNextNote() {
  state.currentNote = pickRandomNote();
  state.currentClef = state.currentNote.clef;
  $('correct-note-display').textContent = '';
  drawStaff($('staff-svg'), state.currentClef, state.currentNote);
}

function handleAnswer(btn) {
  if (!state.isPlaying) return;

  const chosen = btn.dataset.note;
  const correct = state.currentNote.name;
  state.total++;

  // Remove previous animation classes
  document.querySelectorAll('.answer-btn').forEach(b => {
    b.classList.remove('correct-pop', 'wrong-shake');
  });

  // Full-screen flash
  const flash = $('screen-flash');
  flash.classList.remove('correct-flash', 'wrong-flash');
  void flash.offsetWidth; // force reflow

  if (chosen === correct) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;

    btn.classList.add('correct-pop');
    flash.classList.add('correct-flash');
    playSound('correct');

    // Celebrate every 10 in a row
    if (state.streak > 0 && state.streak % 10 === 0) {
      launchConfetti();
      showStreakCelebration(state.streak);
      playSound('streak');
    }
  } else {
    state.streak = 0;
    btn.classList.add('wrong-shake');
    flash.classList.add('wrong-flash');
    playSound('wrong');
    $('correct-note-display').textContent = `The answer was ${correct}`;
  }

  updateGameUI();

  // Brief pause then next note
  state.isPlaying = false;
  setTimeout(() => {
    if (state.timeLeft > 0) {
      state.isPlaying = true;
      showNextNote();
    }
  }, chosen === correct ? 300 : 800);
}

function updateGameUI() {
  $('score-display').textContent = state.score;
  $('streak-display').textContent = state.streak;
}

function startGame() {
  // Check if piano mode
  if ($('game-mode-toggle').checked) {
    startPianoGame();
    return;
  }

  const clefBtn = document.querySelector('#clef-options .option-btn-small.selected, #clef-options .option-btn.selected');
  state.clef = clefBtn ? clefBtn.dataset.value : 'treble';

  const diffBtn = document.querySelector('#difficulty-options .option-btn-small.selected, #difficulty-options .option-btn.selected');
  state.difficulty = diffBtn ? diffBtn.dataset.value : 'lines';

  // Reset state
  state.score = 0;
  state.total = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.timeLeft = 60;
  state.isPlaying = true;
  state.gameMode = 'staff';

  updateGameUI();
  $('timer-display').textContent = '60';
  $('timer-bar').style.width = '100%';
  $('timer-bar').className = 'timer-bar';
  $('correct-note-display').textContent = '';
  $('screen-flash').classList.remove('correct-flash', 'wrong-flash');

  playSound('startup');
  showScreen('game');
  showNextNote();

  // Start timer
  clearInterval(state.timerInterval);
  const startTime = Date.now();
  const duration = 60000;

  state.timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    state.timeLeft = Math.max(0, Math.ceil((duration - elapsed) / 1000));
    const pct = Math.max(0, ((duration - elapsed) / duration) * 100);

    $('timer-display').textContent = state.timeLeft;
    $('timer-bar').style.width = pct + '%';

    // Color changes
    const bar = $('timer-bar');
    bar.classList.remove('warning', 'danger');
    if (pct <= 16) bar.classList.add('danger');
    else if (pct <= 33) bar.classList.add('warning');

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      state.isPlaying = false;
      setTimeout(showResults, 500);
    }
  }, 100);
}

function exitGame() {
  clearInterval(state.timerInterval);
  state.isPlaying = false;

  // Save score if any questions were attempted
  if (state.total > 0) {
    const accuracy = Math.round((state.score / state.total) * 100);
    saveScore(state.score, state.total, accuracy, state.bestStreak, state.clef, state.difficulty);
  }

  updateMenuScores();
  showScreen('menu');
}

// ==================== RESULTS ====================
function showResults() {
  const accuracy = state.total > 0 ? Math.round((state.score / state.total) * 100) : 0;

  let emoji, title, encouragement, color;
  if (accuracy === 100) {
    emoji = '🏆'; title = 'PERFECT!'; color = 'var(--yellow)';
    encouragement = 'Flawless! You\'re a true Note Ninja!';
  } else if (accuracy >= 90) {
    emoji = '⭐'; title = 'Excellent!'; color = 'var(--green)';
    encouragement = 'Amazing work — you\'re really mastering those notes!';
  } else if (accuracy >= 70) {
    emoji = '🎵'; title = 'Great Job!'; color = 'var(--cyan)';
    encouragement = 'You\'re getting there — keep up the great practice!';
  } else if (accuracy >= 50) {
    emoji = '💪'; title = 'Good Effort!'; color = 'var(--orange)';
    encouragement = 'Every practice session makes you stronger. Keep going!';
  } else {
    emoji = '🎯'; title = 'Keep Going!'; color = 'var(--purple)';
    encouragement = 'Don\'t give up — every ninja starts as a beginner!';
  }

  $('results-emoji').textContent = emoji;
  $('results-title').textContent = title;
  $('results-title').style.color = color;
  $('results-encouragement').textContent = encouragement;
  $('results-encouragement').style.color = color;
  $('results-score').textContent = state.score;
  $('results-accuracy').textContent = accuracy + '%';
  $('results-streak').textContent = state.bestStreak;

  playSound('gameover');
  $('results-backdrop').classList.add('show');

  if (accuracy >= 90) setTimeout(launchConfetti, 300);
}

function closeResultsAndRestart() {
  $('results-backdrop').classList.remove('show');
  setTimeout(() => {
    if (state.gameMode === 'piano') startPianoGame();
    else startGame();
  }, 300);
}

function closeResultsAndMenu() {
  $('results-backdrop').classList.remove('show');
  updateMenuScores();
  setTimeout(() => showScreen('menu'), 300);
}

function updateMenuScores() {
  const scores = getScores();
  const menuScoresEl = $('menu-scores');

  if (scores.length === 0) {
    menuScoresEl.style.display = 'none';
  } else {
    menuScoresEl.style.display = 'grid';
    const lastAccuracy = state.total > 0 ? Math.round((state.score / state.total) * 100) : 0;
    $('menu-last-score').textContent = state.score;
    $('menu-last-accuracy').textContent = `${lastAccuracy}% accuracy`;
    const highest = scores[0];
    $('menu-high-score').textContent = highest.score;
    $('menu-high-accuracy').textContent = `${highest.accuracy}% accuracy`;
  }

}

function getScores() {
  try {
    return JSON.parse(localStorage.getItem('noteNinjaScores') || '[]');
  } catch { return []; }
}

function saveScore(score, total, accuracy, bestStreak, clef, difficulty) {
  const scores = getScores();
  scores.push({ score, total, accuracy, bestStreak, clef, difficulty, date: new Date().toLocaleDateString() });
  scores.sort((a, b) => b.score - a.score || b.accuracy - a.accuracy);
  localStorage.setItem('noteNinjaScores', JSON.stringify(scores.slice(0, 50)));
}


// ==================== PIANO GAME ====================

// Two octaves of piano keys: C4 to B5
const PIANO_KEYS = [
  { note: 'C', octave: 4, type: 'white' },
  { note: 'C#', octave: 4, type: 'black' },
  { note: 'D', octave: 4, type: 'white' },
  { note: 'D#', octave: 4, type: 'black' },
  { note: 'E', octave: 4, type: 'white' },
  { note: 'F', octave: 4, type: 'white' },
  { note: 'F#', octave: 4, type: 'black' },
  { note: 'G', octave: 4, type: 'white' },
  { note: 'G#', octave: 4, type: 'black' },
  { note: 'A', octave: 4, type: 'white' },
  { note: 'A#', octave: 4, type: 'black' },
  { note: 'B', octave: 4, type: 'white' },
  { note: 'C', octave: 5, type: 'white' },
  { note: 'C#', octave: 5, type: 'black' },
  { note: 'D', octave: 5, type: 'white' },
  { note: 'D#', octave: 5, type: 'black' },
  { note: 'E', octave: 5, type: 'white' },
  { note: 'F', octave: 5, type: 'white' },
  { note: 'F#', octave: 5, type: 'black' },
  { note: 'G', octave: 5, type: 'white' },
  { note: 'G#', octave: 5, type: 'black' },
  { note: 'A', octave: 5, type: 'white' },
  { note: 'A#', octave: 5, type: 'black' },
  { note: 'B', octave: 5, type: 'white' },
];

// Key pools by level
const PIANO_WHITE_KEYS = PIANO_KEYS.filter(k => k.type === 'white');
const PIANO_ALL_KEYS = PIANO_KEYS;

// Treble clef notes mapped to piano keys for Level 3
const TREBLE_TO_PIANO = [
  { note: 'C', y: 160, label: 'C4', octave: 4, ledgerY: [160] },
  { note: 'D', y: 150, label: 'D4', octave: 4 },
  { note: 'E', y: 140, label: 'E4', octave: 4 },
  { note: 'F', y: 130, label: 'F4', octave: 4 },
  { note: 'G', y: 120, label: 'G4', octave: 4 },
  { note: 'A', y: 110, label: 'A4', octave: 4 },
  { note: 'B', y: 100, label: 'B4', octave: 4 },
  { note: 'C', y: 90,  label: 'C5', octave: 5 },
  { note: 'D', y: 80,  label: 'D5', octave: 5 },
  { note: 'E', y: 70,  label: 'E5', octave: 5 },
  { note: 'F', y: 60,  label: 'F5', octave: 5 },
  { note: 'G', y: 50,  label: 'G5', octave: 5 },
  { note: 'A', y: 40,  label: 'A5', octave: 5, ledgerY: [40] },
  { note: 'B', y: 30,  label: 'B5', octave: 5, ledgerY: [40] },
];

function buildPianoKeyboard() {
  const keyboard = $('piano-keyboard');
  keyboard.innerHTML = '';
  PIANO_KEYS.forEach((key, idx) => {
    const el = document.createElement('div');
    el.className = 'piano-key ' + key.type;
    el.dataset.index = idx;
    el.dataset.note = key.note;
    el.dataset.octave = key.octave;
    el.addEventListener('click', () => handlePianoKeyClick(el));
    keyboard.appendChild(el);
  });
}

function getPianoNotePool() {
  if (state.pianoLevel === 'level2') return PIANO_ALL_KEYS;
  if (state.pianoLevel === 'level3') return TREBLE_TO_PIANO;
  return PIANO_WHITE_KEYS;
}

function pickRandomPianoNote() {
  const pool = getPianoNotePool();
  let note;
  do {
    note = pool[Math.floor(Math.random() * pool.length)];
  } while (state.pianoCurrentNote && note.note === state.pianoCurrentNote.note &&
    (note.octave || 0) === (state.pianoCurrentNote.octave || 0) && pool.length > 1);
  return note;
}

function highlightPianoKey(note) {
  document.querySelectorAll('.piano-key').forEach(k => k.classList.remove('highlighted'));
  document.querySelectorAll('.piano-key').forEach(k => {
    if (k.dataset.note === note.note && parseInt(k.dataset.octave) === note.octave) {
      k.classList.add('highlighted');
    }
  });
}

function showNextPianoNote() {
  state.pianoCurrentNote = pickRandomPianoNote();
  $('piano-correct-note-display').textContent = '';

  if (state.pianoLevel === 'level3') {
    // Draw note on staff, don't highlight piano key
    document.querySelectorAll('.piano-key').forEach(k => {
      k.classList.remove('highlighted', 'correct-key', 'wrong-key');
    });
    drawStaff($('piano-staff-svg'), 'treble', state.pianoCurrentNote);
  } else {
    highlightPianoKey(state.pianoCurrentNote);
  }
}

function handlePianoKeyClick(keyEl) {
  if (!state.isPlaying || state.pianoLevel !== 'level3') return;

  const chosen = keyEl.dataset.note;
  const chosenOctave = parseInt(keyEl.dataset.octave);
  const correct = state.pianoCurrentNote.note;
  const correctOctave = state.pianoCurrentNote.octave;
  state.total++;

  // Clear previous key feedback
  document.querySelectorAll('.piano-key').forEach(k => k.classList.remove('correct-key', 'wrong-key'));

  const flash = $('piano-staff-flash');
  flash.classList.remove('correct-flash', 'wrong-flash');
  void flash.offsetWidth;

  if (chosen === correct && chosenOctave === correctOctave) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;

    keyEl.classList.add('correct-key');
    flash.classList.add('correct-flash');
    playSound('correct');

    if (state.streak > 0 && state.streak % 10 === 0) {
      launchConfetti();
      showStreakCelebration(state.streak);
      playSound('streak');
    }
  } else {
    state.streak = 0;
    keyEl.classList.add('wrong-key');
    // Highlight correct key
    document.querySelectorAll('.piano-key').forEach(k => {
      if (k.dataset.note === correct && parseInt(k.dataset.octave) === correctOctave) {
        k.classList.add('correct-key');
      }
    });
    flash.classList.add('wrong-flash');
    playSound('wrong');
    $('piano-correct-note-display').textContent = 'The answer was ' + correct + correctOctave;
  }

  updatePianoGameUI();

  state.isPlaying = false;
  const wasCorrect = (chosen === correct && chosenOctave === correctOctave);
  setTimeout(() => {
    if (state.timeLeft > 0) {
      state.isPlaying = true;
      showNextPianoNote();
    }
  }, wasCorrect ? 300 : 800);
}

function handlePianoAnswer(btn) {
  if (!state.isPlaying || state.pianoLevel === 'level3') return;

  const chosen = btn.dataset.note;
  const correct = state.pianoCurrentNote.note;
  state.total++;

  // Remove previous animation classes from both grids
  document.querySelectorAll('#piano-answer-grid .answer-btn, #piano-sharps-grid .answer-btn').forEach(b => {
    b.classList.remove('correct-pop', 'wrong-shake');
  });

  const flash = $('piano-screen-flash');
  flash.classList.remove('correct-flash', 'wrong-flash');
  void flash.offsetWidth;

  if (chosen === correct) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;

    btn.classList.add('correct-pop');
    flash.classList.add('correct-flash');
    playSound('correct');

    if (state.streak > 0 && state.streak % 10 === 0) {
      launchConfetti();
      showStreakCelebration(state.streak);
      playSound('streak');
    }
  } else {
    state.streak = 0;
    btn.classList.add('wrong-shake');
    flash.classList.add('wrong-flash');
    playSound('wrong');
    $('piano-correct-note-display').textContent = 'The answer was ' + correct;
  }

  updatePianoGameUI();

  state.isPlaying = false;
  setTimeout(() => {
    if (state.timeLeft > 0) {
      state.isPlaying = true;
      showNextPianoNote();
    }
  }, chosen === correct ? 300 : 800);
}

function updatePianoGameUI() {
  $('piano-score-display').textContent = state.score;
  $('piano-streak-display').textContent = state.streak;
}

function startPianoGame() {

  state.score = 0;
  state.total = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.timeLeft = 60;
  state.isPlaying = true;
  state.gameMode = 'piano';
  state.clef = 'piano';

  // Read selected piano difficulty
  const selBtn = document.querySelector('#piano-difficulty-options .option-btn.selected');
  state.pianoLevel = selBtn ? selBtn.dataset.value : 'level1';
  state.difficulty = state.pianoLevel === 'level1' ? 'Natural Notes' :
                     state.pianoLevel === 'level2' ? 'Sharps & Flats' : 'Staff to Keys';

  // Configure UI for difficulty level
  const sharpsGrid = $('piano-sharps-grid');
  const answerGrid = $('piano-answer-grid');
  const staffContainer = $('piano-staff-container');

  sharpsGrid.style.display = state.pianoLevel === 'level2' ? '' : 'none';
  staffContainer.style.display = state.pianoLevel === 'level3' ? '' : 'none';
  answerGrid.style.display = state.pianoLevel === 'level3' ? 'none' : '';

  // Align natural notes to 14-column grid when sharps row is visible
  if (state.pianoLevel === 'level2') {
    answerGrid.classList.add('answer-grid-aligned');
  } else {
    answerGrid.classList.remove('answer-grid-aligned');
  }

  // Toggle clickable piano keys for Level 3
  document.querySelectorAll('.piano-key').forEach(k => {
    k.classList.remove('highlighted', 'correct-key', 'wrong-key');
    if (state.pianoLevel === 'level3') {
      k.classList.add('clickable');
    } else {
      k.classList.remove('clickable');
    }
  });

  updatePianoGameUI();
  $('piano-timer-display').textContent = '60';
  $('piano-timer-bar').style.width = '100%';
  $('piano-timer-bar').className = 'timer-bar';
  $('piano-correct-note-display').textContent = '';
  $('piano-screen-flash').classList.remove('correct-flash', 'wrong-flash');

  playSound('startup');
  showScreen('piano');
  showNextPianoNote();

  clearInterval(state.timerInterval);
  const startTime = Date.now();
  const duration = 60000;

  state.timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    state.timeLeft = Math.max(0, Math.ceil((duration - elapsed) / 1000));
    const pct = Math.max(0, ((duration - elapsed) / duration) * 100);

    $('piano-timer-display').textContent = state.timeLeft;
    $('piano-timer-bar').style.width = pct + '%';

    const bar = $('piano-timer-bar');
    bar.classList.remove('warning', 'danger');
    if (pct <= 16) bar.classList.add('danger');
    else if (pct <= 33) bar.classList.add('warning');

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      state.isPlaying = false;
      setTimeout(showResults, 500);
    }
  }, 100);
}

function exitPianoGame() {
  clearInterval(state.timerInterval);
  state.isPlaying = false;

  if (state.total > 0) {
    const accuracy = Math.round((state.score / state.total) * 100);
    saveScore(state.score, state.total, accuracy, state.bestStreak, state.clef, state.difficulty);
  }

  updateMenuScores();
  showScreen('menu');
}

// ==================== START ====================
init();
</script>
</body>
</html>
